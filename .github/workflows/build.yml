name: Build Nemo Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          chmod +x scripts/docker-build.sh
          ./scripts/docker-build.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: nemo-firmware
          path: build/
